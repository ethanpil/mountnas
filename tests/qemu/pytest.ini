[pytest]
addopts = -ra --strict-markers
log_level = DEBUG
log_format = %(asctime)s %(levelname)-7s %(name)s: %(message)s
log_date_format = %H:%M:%S
junit_family = xunit2
markers =
    smoke: fast sanity subset (~15 min under KVM); run with -m smoke
    upgrade: full in-place upgrade tests (slow; -m "not upgrade" to skip)
    faults: hot-plug / power-cut / I/O-error injection tests
    network: needs internet access (auto-skipped when offline)
    slow: individually long-running tests (snapraid sync etc.)
    needs_prev: needs a previous published release (skips when none)
