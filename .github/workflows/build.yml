name: Build MountNAS
on:
  workflow_dispatch:
    inputs:
      release_tag:   { description: "Release tag (image filename)", required: true, default: "dev" }
      alpine_branch: { description: "Alpine branch", required: true, default: "latest-stable" }
      aports_ref:    { description: "aports git ref — MUST match alpine_branch's version (latest-stable is currently 3.24, so use 3.24-stable)", required: true, default: "3.24-stable" }
      arch:          { description: "Architecture", required: true, default: "x86_64" }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jirutka/setup-alpine@v1
        with:
          branch: ${{ inputs.alpine_branch }}
          arch: ${{ inputs.arch }}
          packages: >
            alpine-sdk alpine-conf apk-tools busybox fakeroot syslinux xorriso
            squashfs-tools mtools dosfstools grub grub-efi git e2fsprogs gptfdisk util-linux
      # apk sandboxes package scripts with unshare(); the non-root build user can
      # only do that if unprivileged user namespaces are allowed. ubuntu-latest
      # (24.04) blocks them by default via AppArmor — re-enable so apk scripts,
      # abuild, and mkimage all work as the build user. Runs on the host, not Alpine.
      - name: Allow unprivileged user namespaces (apk script sandbox)
        shell: bash
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
      - name: Build
        shell: alpine.sh --root {0}
        run: |
          set -eu
          TAG="${{ inputs.release_tag }}"; ARCH="${{ inputs.arch }}"; APORTS_REF="${{ inputs.aports_ref }}"
          apk update; adduser -D build; addgroup build abuild 2>/dev/null || true
          # abuild runs as the non-root build user but must 'apk add' build deps
          # ('-r' installs both make- and regular depends), which needs root. Give it
          # passwordless doas — abuild's standard elevation (it shells out to doas).
          # Also pre-install snapraid's compile dep (linux-headers) as a safety net.
          apk add doas linux-headers
          echo "permit nopass keepenv build" > /etc/doas.conf
          chmod 0400 /etc/doas.conf
          cp -r "$GITHUB_WORKSPACE" /home/build/repo; chown -R build:build /home/build
          # Generate the package signing key as the build user (this sets
          # PACKAGER_PRIVKEY in ~build/.abuild/abuild.conf). We omit -i so keygen
          # never needs root/doas; instead we install the public key into
          # /etc/apk/keys ourselves (as root) so apk trusts the locally-built
          # mountnas-tools repo when mkimage pulls from it.
          su build -s /bin/sh -c 'export HOME=/home/build; abuild-keygen -an'
          cp /home/build/.abuild/*.rsa.pub /etc/apk/keys/
          su build -s /bin/sh -c '
            set -eu; export HOME=/home/build
            export PACKAGES_LIST="$HOME/repo/packages.list" ARCH="'"$ARCH"'"
            cd "$HOME"; git clone --depth=1 --branch "'"$APORTS_REF"'" https://gitlab.alpinelinux.org/alpine/aports.git
            echo "== preflight =="
            apk add --simulate $(sed -e "s/#.*//" -e "/^[[:space:]]*$/d" "$HOME"/repo/packages.list | grep -vE "^(mountnas-tools|snapraid|mergerfs|zerotier-one)$") linux-lts
            echo "== verify every enabled service has an init script =="
            # install just the openrc service-script packages into a throwaway root
            # (no firmware) and confirm each rc_add service name resolves to a script.
            apk add --root "$HOME/checkroot" --initdb --usermode --quiet \
              --repositories-file /etc/apk/repositories --allow-untrusted --no-scripts \
              openrc busybox-openrc openssh-server-common-openrc dbus-openrc avahi-openrc \
              chrony-openrc acpid-openrc rpcbind-openrc smartmontools-openrc \
              docker-openrc samba-server-openrc nfs-utils-openrc lvm2-openrc mdadm-openrc
            miss=""
            for s in dbus avahi-daemon sshd chronyd acpid crond rpcbind smartd syslog \
                     docker samba nfs networking localmount local bootmisc; do
              [ -f "$HOME/checkroot/etc/init.d/$s" ] || miss="$miss $s"
            done
            [ -z "$miss" ] || { echo "MISSING init scripts for:$miss — add the right -openrc package(s)"; exit 1; }
            echo "== build mountnas-tools =="
            ( cd "$HOME"/repo/mountnas-tools && abuild -r )
            echo "== build snapraid (compiled from source) =="
            ( cd "$HOME"/repo/snapraid && abuild checksum && abuild -r )
            echo "== build mergerfs (repackage upstream static binary) =="
            ( cd "$HOME"/repo/mergerfs && abuild checksum && abuild -r )
            echo "== build zerotier-one (repackage upstream apk under our key) =="
            ( cd "$HOME"/repo/zerotier-one && abuild checksum && abuild -r )
            echo "== ISO =="
            cp "$HOME"/repo/scripts/* aports/scripts/
            mkdir -p "$HOME/iso" "$HOME/tmp"; export TMPDIR="$HOME/tmp"
            # mkimage only uses the repositories passed via --repository (it does NOT
            # inherit the host apk repos), so the stable main/community repos must be
            # passed explicitly alongside our local repo — else linux-lts/alpine-base
            # etc. cannot resolve. Build the --repository args from the host config.
            REPO_ARGS=""
            while IFS= read -r r; do
              case "$r" in ""|\#*) continue ;; esac
              REPO_ARGS="$REPO_ARGS --repository $r"
            done < /etc/apk/repositories
            sh aports/scripts/mkimage.sh --tag "'"$TAG"'" --outdir "$HOME/iso" --arch "'"$ARCH"'" \
              $REPO_ARGS --repository "$HOME/packages/repo" --profile nas
            echo "== seed overlay + world.base =="
            ( cd "$HOME/iso"
              # Run genapkovl under fakeroot so its chown root:root calls succeed
              # (it runs as the non-root build user); otherwise the overlay records
              # the build uid and /etc/doas.conf gets rejected by doas at runtime.
              fakeroot sh "$HOME"/repo/scripts/genapkovl-mountnas.sh mountnas
              { echo alpine-base; sed -e "s/#.*//" -e "/^[[:space:]]*$/d" "$PACKAGES_LIST"; echo linux-firmware mkinitfs; } \
                | tr " " "\n" | sort -u > world.base )
          '
          echo "== assemble two-slot .img (A populated, B empty) =="
          apk add sgdisk parted   # sgdisk (own package, not in gptfdisk) + partprobe
          ISO=$(ls /home/build/iso/*.iso); OVL=$(ls /home/build/iso/*.apkovl.tar.gz); WB=/home/build/iso/world.base
          IMG="/home/build/iso/mountnas-$TAG.img"
          truncate -s 6G "$IMG"; LOOP=$(losetup -fP --show "$IMG")
          sgdisk --zap-all "$LOOP"
          sgdisk -n1:0:+4GiB -t1:ef00 -c1:BOOT "$LOOP"
          sgdisk -n2:0:0 -t2:8300 -c2:MNASCFG "$LOOP"
          partprobe "$LOOP"; sleep 1
          mkfs.vfat -F32 -n BOOT "${LOOP}p1"
          mkfs.ext4 -F -L MNASCFG "${LOOP}p2"     # found by label; no magic UUID
          M=$(mktemp -d); mount "${LOOP}p1" "$M"
          setup-bootable "$ISO" "$M"
          mkdir -p "$M/A/boot" "$M/A/apks"
          mv "$M"/boot/vmlinuz-lts "$M"/boot/initramfs-lts "$M"/boot/modloop-lts "$M/A/boot/" 2>/dev/null || true
          [ -d "$M/apks" ] && mv "$M"/apks/* "$M/A/apks/" 2>/dev/null || true
          cp "$WB" "$M/A/world.base"
          echo "modules=loop,squashfs,sd-mod,usb-storage,vfat,ext4 console=tty0 console=ttyS0,115200 ovl_dev=LABEL=MNASCFG" > "$M/cmdline.base"
          echo A > "$M/mountnas-active"; touch "$M/.nas-boot"
          # generate bootloader config (uses the same helper the device ships)
          install -Dm755 /home/build/repo/mountnas-tools/files/write-bootcfg /usr/libexec/mountnas/write-bootcfg
          /usr/libexec/mountnas/write-bootcfg "$M" A ""
          umount "$M"
          mount "${LOOP}p2" "$M"; cp "$OVL" "$M/$(basename "$OVL")"; sync; umount "$M"
          losetup -d "$LOOP"; gzip -9 "$IMG"
          # Embed world.base into the release ISO now, AFTER setup-bootable consumed
          # the clean ISO. Embedding earlier re-lays-out the ISO and breaks the
          # streaming reader (uniso) that setup-bootable uses ("non-linear reads").
          # At runtime, nas upgrade loop-mounts the ISO, which handles any layout.
          xorriso -dev "$ISO" -map "$WB" /world.base -commit
          mkdir -p out; cp /home/build/iso/*.iso /home/build/iso/*.apkovl.tar.gz out/ || true
          cp "$IMG.gz" out/; ( cd out && sha256sum * > SHA256SUMS )
      - uses: actions/upload-artifact@v4
        with:
          name: mountnas-${{ inputs.release_tag }}
          path: out/*
          if-no-files-found: error
      # Optional: publish a GitHub Release with out/* (softprops/action-gh-release on a tag).
