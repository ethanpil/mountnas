name: Build MountNAS
on:
  workflow_dispatch:
    inputs:
      release_tag:   { description: "Release tag (image filename)", required: true, default: "dev" }
      alpine_branch: { description: "Alpine branch", required: true, default: "latest-stable" }
      aports_ref:    { description: "aports git ref — leave EMPTY to auto-derive from the installed Alpine version (e.g. 3.24 -> 3.24-stable); set only to override", required: false, default: "" }
      arch:          { description: "Architecture", required: true, default: "x86_64" }
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # publish the build outputs as a GitHub Release
    steps:
      # Third-party actions are pinned by commit SHA (not tag): this workflow
      # holds the package-signing key and publishes releases, and a tag can be
      # re-pointed by a compromised action repo. Bump the SHA + comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Lint before anything expensive. The file list is discovered inside
      # ci-lint.sh (shebang grep + globs) so a newly added script can never be
      # silently unlinted; rationale for the flags/excludes lives there too.
      - name: Lint shell scripts (shellcheck)
        shell: bash
        run: sh scripts/ci-lint.sh
      - uses: jirutka/setup-alpine@ae3b3ddba35054804fc4a3507b519fa7e8152050 # v1.4.1
        with:
          branch: ${{ inputs.alpine_branch }}
          arch: ${{ inputs.arch }}
          packages: >
            alpine-sdk alpine-conf apk-tools busybox fakeroot syslinux xorriso
            squashfs-tools mtools dosfstools grub grub-efi git e2fsprogs gptfdisk util-linux
      # apk sandboxes package scripts with unshare(); the non-root build user can
      # only do that if unprivileged user namespaces are allowed. ubuntu-latest
      # (24.04) blocks them by default via AppArmor — re-enable so apk scripts,
      # abuild, and mkimage all work as the build user. Runs on the host, not Alpine.
      - name: Allow unprivileged user namespaces (apk script sandbox)
        shell: bash
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
      - name: Build
        shell: alpine.sh --root {0}
        env:
          # Optional fixed package-signing key (repo secret). When set, every
          # release is signed by the same key (stable trust anchor); when absent
          # (forks/PRs) the build falls back to a random per-build key.
          ABUILD_PRIVKEY: ${{ secrets.ABUILD_PRIVKEY }}
        run: |
          set -eu
          TAG="${{ inputs.release_tag }}"; ARCH="${{ inputs.arch }}"; APORTS_REF="${{ inputs.aports_ref }}"
          # aports_ref MUST match the installed Alpine's version (a mkimage.sh from
          # the wrong aports fails against the installed apk-tools). Deriving it
          # here removes the update-both-inputs footgun on a new Alpine release;
          # the workflow input stays as a manual override.
          if [ -z "$APORTS_REF" ]; then
            APORTS_REF="$(cut -d. -f1,2 /etc/alpine-release)-stable"
          fi
          echo "aports ref: $APORTS_REF"
          apk update; adduser -D build; addgroup build abuild 2>/dev/null || true
          # abuild runs as the non-root build user but must 'apk add' build deps
          # ('-r' installs both make- and regular depends), which needs root. Give it
          # passwordless doas — abuild's standard elevation (it shells out to doas).
          # Also pre-install snapraid's compile dep (linux-headers) as a safety net.
          apk add doas linux-headers
          echo "permit nopass keepenv build" > /etc/doas.conf
          chmod 0400 /etc/doas.conf
          cp -r "$GITHUB_WORKSPACE" /home/build/repo; chown -R build:build /home/build
          # Package signing key. Preferred: the fixed key from the ABUILD_PRIVKEY
          # secret (stable trust anchor — the published .rsa.pub stops changing
          # every build). Fallback: generate a random per-build key (this sets
          # PACKAGER_PRIVKEY in ~build/.abuild/abuild.conf). We omit -i so keygen
          # never needs root/doas; instead we install the public key into
          # /etc/apk/keys ourselves (as root) so apk trusts the locally-built
          # mountnas-tools repo when mkimage pulls from it.
          if [ -n "${ABUILD_PRIVKEY:-}" ]; then
            apk add openssl
            mkdir -p /home/build/.abuild
            printf '%s\n' "$ABUILD_PRIVKEY" > /home/build/.abuild/mountnas.rsa
            chmod 600 /home/build/.abuild/mountnas.rsa
            openssl rsa -in /home/build/.abuild/mountnas.rsa -pubout \
              -out /home/build/.abuild/mountnas.rsa.pub
            echo "PACKAGER_PRIVKEY=/home/build/.abuild/mountnas.rsa" >> /home/build/.abuild/abuild.conf
            chown -R build:build /home/build/.abuild
          else
            su build -s /bin/sh -c 'export HOME=/home/build; abuild-keygen -an'
          fi
          cp /home/build/.abuild/*.rsa.pub /etc/apk/keys/
          su build -s /bin/sh -c '
            set -eu; export HOME=/home/build
            export PACKAGES_LIST="$HOME/repo/packages.list" ARCH="'"$ARCH"'"
            export CMDLINE_FILE="$HOME/repo/scripts/cmdline.base"
            cd "$HOME"; git clone --depth=1 --branch "'"$APORTS_REF"'" https://gitlab.alpinelinux.org/alpine/aports.git
            echo "== preflight =="
            apk add --simulate $(sed -e "s/#.*//" -e "/^[[:space:]]*$/d" "$HOME"/repo/packages.list | grep -vE "^(mountnas-tools|snapraid|mergerfs|zerotier-one)$") linux-lts
            echo "== verify every enabled service has an init script =="
            # install just the openrc service-script packages into a throwaway root
            # (no firmware) and confirm each rc_add service name resolves to a script.
            apk add --root "$HOME/checkroot" --initdb --usermode --quiet \
              --repositories-file /etc/apk/repositories --allow-untrusted --no-scripts \
              openrc busybox-openrc openssh-server-common-openrc dbus-openrc avahi-openrc \
              chrony-openrc acpid-openrc rpcbind-openrc smartmontools-openrc \
              docker-openrc samba-server-openrc nfs-utils-openrc lvm2-openrc mdadm-openrc
            miss=""
            for s in dbus avahi-daemon sshd chronyd acpid crond rpcbind smartd syslog \
                     docker samba nfs networking localmount local bootmisc; do
              [ -f "$HOME/checkroot/etc/init.d/$s" ] || miss="$miss $s"
            done
            [ -z "$miss" ] || { echo "MISSING init scripts for:$miss — add the right -openrc package(s)"; exit 1; }
            echo "== wire the release tag into mountnas-tools pkgver =="
            # nas version / nas status report /usr/share/mountnas/version, which is
            # pkgver — without this it would say 1.0.0 forever regardless of release.
            # Tags that are not a valid apk version (e.g. "dev") fall back to a dated one.
            V="'"$TAG"'"; V="${V#v}"
            echo "$V" | grep -Eq "^[0-9]+(\.[0-9]+)*[a-z]?(_(alpha|beta|pre|rc|p|git)[0-9]*)*$" \
              || V="1.0.0_git$(date +%Y%m%d)"
            sed -i "s/^pkgver=.*/pkgver=$V/" "$HOME"/repo/mountnas-tools/APKBUILD
            echo "mountnas-tools pkgver = $V"
            echo "== build mountnas-tools =="
            ( cd "$HOME"/repo/mountnas-tools && abuild -r )
            echo "== build snapraid (compiled from source) =="
            # No checksum regeneration here: the sha512sums committed in each
            # APKBUILD are the integrity check. Regenerating at build time would
            # make verification a no-op (hash whatever was just downloaded).
            ( cd "$HOME"/repo/snapraid && abuild -r )
            echo "== build mergerfs (repackage upstream static binary) =="
            ( cd "$HOME"/repo/mergerfs && abuild -r )
            echo "== build zerotier-one (repackage upstream apk under our key) =="
            ( cd "$HOME"/repo/zerotier-one && abuild -r )
            echo "== ISO =="
            cp "$HOME"/repo/scripts/* aports/scripts/
            mkdir -p "$HOME/iso" "$HOME/tmp"; export TMPDIR="$HOME/tmp"
            # mkimage only uses the repositories passed via --repository (it does NOT
            # inherit the host apk repos), so the stable main/community repos must be
            # passed explicitly alongside our local repo — else linux-lts/alpine-base
            # etc. cannot resolve. Build the --repository args from the host config.
            REPO_ARGS=""
            while IFS= read -r r; do
              case "$r" in ""|\#*) continue ;; esac
              REPO_ARGS="$REPO_ARGS --repository $r"
            done < /etc/apk/repositories
            sh aports/scripts/mkimage.sh --tag "'"$TAG"'" --outdir "$HOME/iso" --arch "'"$ARCH"'" \
              $REPO_ARGS --repository "$HOME/packages/repo" --profile nas
            echo "== seed overlay + world.base =="
            ( cd "$HOME/iso"
              # Run genapkovl under fakeroot so its chown root:root calls succeed
              # (it runs as the non-root build user); otherwise the overlay records
              # the build uid and /etc/doas.conf gets rejected by doas at runtime.
              fakeroot sh "$HOME"/repo/scripts/genapkovl-mountnas.sh mountnas
              # world.base MUST equal the seed overlay world (both come from
              # mkworld.sh): nas upgrade unions world.base into the live world,
              # so a stray package here breaks apk on every upgraded box.
              sh "$HOME"/repo/scripts/mkworld.sh > world.base
              tar -xzOf mountnas.apkovl.tar.gz etc/apk/world | diff - world.base \
                || { echo "ERROR: seed world != world.base (mkworld.sh drift)"; exit 1; } )
          '
          echo "== assemble single-slot .img (BOOT + MNASCFG) =="
          apk add sgdisk parted   # sgdisk (own package, not in gptfdisk) + partprobe
          ISO=$(ls /home/build/iso/*.iso); OVL=$(ls /home/build/iso/*.apkovl.tar.gz); WB=/home/build/iso/world.base
          IMG="/home/build/iso/mountnas-$TAG.img"
          truncate -s 6G "$IMG"; LOOP=$(losetup -fP --show "$IMG")
          sgdisk --zap-all "$LOOP"
          sgdisk -n1:0:+4GiB -t1:ef00 -c1:BOOT "$LOOP"
          sgdisk -n2:0:0 -t2:8300 -c2:MNASCFG "$LOOP"
          # Legacy BIOS bootable attribute (GPT bit 2) on BOOT. SeaBIOS (Proxmox's
          # default firmware) chainloads via gptmbr.bin, which only boots a GPT
          # partition carrying this attribute. Without it: "Booting from Hard
          # Disk..." then an indefinite hang. (gptmbr.bin is written further down.)
          sgdisk --attributes=1:set:2 "$LOOP"
          partprobe "$LOOP"; sleep 1
          mkfs.vfat -F32 -n BOOT "${LOOP}p1"
          mkfs.ext4 -F -L MNASCFG "${LOOP}p2"     # found by label; no magic UUID
          M=$(mktemp -d); mount "${LOOP}p1" "$M"
          setup-bootable "$ISO" "$M"
          # setup-bootable lays down the native diskless layout: kernel/initramfs/
          # modloop under /boot, the apk repo under /apks (with its .boot_repository
          # marker). Single slot: keep it as-is and just assert the pieces landed
          # (NO '|| true' — a setup-bootable layout change fails the build loudly).
          for f in vmlinuz-lts initramfs-lts modloop-lts; do
            [ -f "$M/boot/$f" ] || { echo "ERROR: missing boot/$f"; exit 1; }
          done
          [ -f "$M/apks/x86_64/APKINDEX.tar.gz" ] || { echo "ERROR: apks/ has no APKINDEX"; exit 1; }
          # alpine.base: the base's Alpine version (e.g. 3.24). 'nas upgrade' uses
          # it to re-pin the CDN repo lines in /etc/apk/repositories, since that
          # file is user-owned config the upgrade must not blindly overwrite.
          cut -d. -f1,2 /etc/alpine-release > "$M/alpine.base"
          # The diskless init finds the on-media apk repo via a .boot_repository marker
          # (find_boot_repositories) + alpine_repo=auto. Guarantee the marker exists
          # (setup-bootable ships it); without it 0 packages install -> no /sbin/init.
          touch "$M/apks/.boot_repository"
          cp "$WB" "$M/world.base"
          # cmdline.base: the repo's single source (also used by mkimg.nas.sh via
          # CMDLINE_FILE; write-bootcfg reads this on-media copy). Never echo an
          # inline cmdline here — edit scripts/cmdline.base instead.
          cp /home/build/repo/scripts/cmdline.base "$M/cmdline.base"
          touch "$M/.nas-boot"
          # generate bootloader config (uses the same helper the device ships)
          install -Dm755 /home/build/repo/mountnas-tools/files/write-bootcfg /usr/libexec/mountnas/write-bootcfg
          /usr/libexec/mountnas/write-bootcfg "$M"
          # --- Make the image boot under BOTH firmwares ---
          # setup-bootable runs `syslinux <device>` only when handed a DEVICE; we
          # hand it the mounted dir, so it copies files but leaves the partition's
          # dosfstools dummy VBR ("This is not a bootable disk") in place. We install
          # both loaders ourselves. Steps that need the FAT MOUNTED first:
          #  - BIOS: syslinux 6.x loads ldlinux.sys -> ldlinux.c32, which must sit at
          #    the FAT root next to ldlinux.sys or the boot aborts ("Failed to load
          #    ldlinux.c32"). syslinux --install (below, unmounted) writes ldlinux.sys.
          cp /usr/share/syslinux/ldlinux.c32 "$M"/ldlinux.c32
          #  - UEFI (OVMF): grub at the ESP removable fallback path
          #    (/EFI/BOOT/BOOTX64.EFI) so the firmware boots with no NVRAM entry.
          #    grub-install only lays down the core image + modules; it loads the
          #    hand-written /boot/grub/grub.cfg that write-bootcfg just generated.
          grub-install --target=x86_64-efi --efi-directory="$M" \
            --boot-directory="$M/boot" --removable --no-nvram
          umount "$M"
          # Steps that need the FAT UNMOUNTED:
          #  - BIOS: write the syslinux boot code into the BOOT partition VBR (+
          #    ldlinux.sys) — the piece setup-bootable skipped.
          syslinux --install "${LOOP}p1"
          #  - BIOS: GPT-aware MBR boot code in the protective MBR (overwrites
          #    setup-bootable's plain mbr.bin, which can't boot GPT). SeaBIOS -> this
          #    MBR -> the legacy-bootable partition's VBR -> syslinux just installed.
          dd bs=440 count=1 conv=notrunc if=/usr/share/syslinux/gptmbr.bin of="$LOOP"
          # MNASCFG carries the seed overlay AND the apk cache dir (next to the
          # apkovl — the standard Alpine diskless cache spot; /etc/apk/cache in
          # the overlay points at /cfg/cache, which is this directory at runtime).
          mount "${LOOP}p2" "$M"; cp "$OVL" "$M/$(basename "$OVL")"; mkdir -p "$M/cache"; sync; umount "$M"
          losetup -d "$LOOP"; gzip -9 "$IMG"
          # Stage the release files under branded names (published individually,
          # un-zipped). ONE image now serves BOTH fresh install (write to USB) and
          # 'nas upgrade' (which loop-mounts partition 1 to pull the new boot files).
          mkdir -p out
          cp "$IMG.gz" "out/mountnas-$TAG.img.gz"
          cp /home/build/.abuild/*.rsa.pub "out/mountnas-$TAG.rsa.pub"
          ( cd out && sha256sum mountnas-* > SHA256SUMS )
      # Boot the freshly built image in QEMU under BOTH firmwares and require a
      # login prompt on the serial console. Reaching login transitively proves the
      # bootloader chain, .boot_repository discovery, package install into RAM, the
      # seed overlay, and the inittab gettys. Runs BEFORE the release publish, so a
      # non-booting image never ships. Notes:
      #  - if=virtio for the disk: the cmdline module list includes virtio_pci/
      #    virtio_blk (IDE/ata_piix is NOT in the list, so the default bus would
      #    never be found by the initramfs).
      #  - grep "login:" on the serial log: busybox getty prints the issue banner
      #    and prompt together, so the match means a getty is up on ttyS0.
      - name: Boot smoke test (SeaBIOS + OVMF)
        shell: bash
        run: |
          set -eu
          sudo apt-get update -q
          sudo apt-get install -qy qemu-system-x86 ovmf
          # GitHub-hosted Linux runners expose KVM; make it usable for our user.
          KVM=""
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; KVM="-enable-kvm -cpu host"; fi
          gzip -dc "out/mountnas-${{ inputs.release_tag }}.img.gz" > /tmp/nas.img
          run_boot() {
            name=$1; shift
            log=/tmp/serial-$name.log
            echo "== boot test: $name =="
            qemu-system-x86_64 $KVM -m 4096 -display none \
              -drive file=/tmp/nas.img,format=raw,if=virtio \
              -serial "file:$log" "$@" &
            pid=$!
            reached=0
            for _ in $(seq 1 420); do
              if grep -q "login:" "$log" 2>/dev/null; then reached=1; break; fi
              kill -0 "$pid" 2>/dev/null || break
              sleep 1
            done
            kill "$pid" 2>/dev/null || true; wait "$pid" 2>/dev/null || true
            if [ "$reached" = 1 ]; then
              echo "[$name] reached the login prompt"; tail -n 3 "$log"
            else
              echo "[$name] FAILED to reach a login prompt"; echo "--- serial log ---"
              cat "$log" 2>/dev/null || echo "(no serial output at all)"
              exit 1
            fi
          }
          run_boot bios
          run_boot uefi -bios /usr/share/ovmf/OVMF.fd
      # Upgrade-path smoke test: boot the PREVIOUS published release in QEMU and
      # drive its serial console (expect) through a real 'nas upgrade' to the
      # image THIS run just built, then reboot and require (a) a login shell,
      # (b) the new version, (c) a world free of media-unresolvable packages.
      # This exercises the riskiest shipped path — the one that can brick a
      # headless box — before anything is published. Skipped with a notice when
      # the repo has no previous release carrying an .img.gz (first release,
      # forks). Work area lives on /mnt (the runner's big ephemeral disk):
      # old image (~6 GB) + payload disk (~8 GB real).
      - name: Upgrade smoke test (previous release -> this build)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          api="https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest"
          old_url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "$api" 2>/dev/null \
            | jq -r '.assets[]?.browser_download_url // empty' | grep -m1 '\.img\.gz$' || true)
          if [ -z "$old_url" ]; then
            echo "NOTICE: no previous release with an .img.gz asset - skipping the upgrade test."
            exit 0
          fi
          echo "previous release image: $old_url"
          sudo apt-get install -qy expect
          WORK=/mnt/upgrade-test; sudo mkdir -p "$WORK"; sudo chmod 777 "$WORK"
          # Expected post-upgrade version = the new image's mountnas-tools pkgver,
          # read from the apk filename inside the image the boot test unpacked.
          LOOP=$(sudo losetup -fP --show /tmp/nas.img)
          M=$(mktemp -d); sudo mount -o ro "${LOOP}p1" "$M"
          NEWVER=$(basename "$(ls "$M"/apks/${{ inputs.arch }}/mountnas-tools-*.apk | head -n1)" .apk)
          NEWVER=${NEWVER#mountnas-tools-}; NEWVER=${NEWVER%-r*}
          sudo umount "$M"; sudo losetup -d "$LOOP"; rmdir "$M"
          rm -f /tmp/nas.img   # return the boot test's 6 GB before unpacking more
          echo "expecting post-upgrade version: $NEWVER"
          curl -fsSL "$old_url" | gzip -dc > "$WORK/old.img"
          # Payload disk: carries the new .img.gz into the guest AND provides the
          # upgrade's temp space (needs ~7 GiB free -> 12G, no reserved blocks).
          truncate -s 12G "$WORK/updisk.img"
          mkfs.ext4 -Fq -m0 "$WORK/updisk.img"
          UD=$(mktemp -d); sudo mount -o loop "$WORK/updisk.img" "$UD"
          sudo cp "out/mountnas-${{ inputs.release_tag }}.img.gz" "$UD/new.img.gz"
          sudo umount "$UD"; rmdir "$UD"
          KVM=""
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; KVM="-enable-kvm -cpu host"; fi
          {
            echo '#!/bin/sh'
            echo "exec qemu-system-x86_64 $KVM -m 4096 -nographic \\"
            echo "  -drive file=$WORK/old.img,format=raw,if=virtio \\"
            echo "  -drive file=$WORK/updisk.img,format=raw,if=virtio"
          } > "$WORK/run-qemu.sh"
          expect scripts/ci-upgrade-test.exp "$WORK/run-qemu.sh" "$NEWVER"
      # Publish each artifact (img.gz, rsa.pub, SHA256SUMS) as a SEPARATE,
      # individually-downloadable release asset — not a single zip.
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: MountNAS ${{ inputs.release_tag }}
          files: out/*
          fail_on_unmatched_files: true
