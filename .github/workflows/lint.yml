name: Lint
# Fast guard on every push/PR: shellcheck over all shipped scripts (the busybox
# ash strictness bug class in CONTEXT.md §6 recurs; the full image build is
# manual-dispatch only, so without this the lint only ran at release time).
# Same command CI's build job runs; the file list is discovered in ci-lint.sh.
on:
  push:
  pull_request:
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint shell scripts (shellcheck)
        run: sh scripts/ci-lint.sh
